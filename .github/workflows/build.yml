name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify latest code
        run: |
          echo "=== Recent commits ==="
          git log --oneline -5
          echo ""
          echo "=== MainActivity.kt line 96 (should show AlarmManager import) ==="
          sed -n '90,105p' app/src/main/java/com/planttracker/ui/MainActivity.kt
          echo ""
          echo "=== PlantAlarmManager.kt line 43 (should show matureAt) ==="
          sed -n '35,50p' app/src/main/java/com/planttracker/alarm/PlantAlarmManager.kt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Clean Gradle Cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf .gradle/
          rm -rf app/build/

      - name: Build Debug APK
        run: gradle clean assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PlantTracker-debug
          path: app/build/outputs/apk/debug/*.apk
