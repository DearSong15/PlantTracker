name: Extract and Commit

permissions:
  contents: write

on:
  push:
    paths:
      - 'PlantTracker.zip'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract ZIP
        run: |
          unzip PlantTracker.zip -d temp/
          mv temp/PlantTracker/* .
          rm -rf temp/ PlantTracker.zip
      - name: Commit extracted files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extract PlantTracker files"
          git push
